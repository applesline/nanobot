x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:18790:18790"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    volumes:
      - ./config:/home/nanobot/.nanobot:ro
      - ./workspace:/app/workspace:rw
    healthcheck:
      test: ["CMD", "nanobot", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
    read_only: false
    cap_drop: []  
    security_opt: []  
    volumes:
      - ./config:/home/nanobot/.nanobot:ro
      - ./workspace:/app/workspace:rw
      - ~/.ssh:/home/nanobot/.ssh:ro 
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
